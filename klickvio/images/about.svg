<svg viewBox="0 0 560 520" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
  <defs>
    <linearGradient id="aboutGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="aboutGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <circle cx="280" cy="260" r="210" fill="url(#aboutGrad1)" opacity="0.08"/>

  <!-- Central compass / strategy wheel representing mission & vision -->
  <g transform="translate(280,260)">
    <circle r="140" fill="none" stroke="url(#aboutGrad1)" stroke-width="1.5" opacity="0.4"/>
    <circle r="100" fill="#101827" stroke="url(#aboutGrad2)" stroke-width="2"/>
    <circle r="66" fill="#0B1424" stroke="#7C3AED" stroke-width="1.5" opacity="0.7"/>

    <path d="M0 -50 L14 -8 L0 8 L-14 -8 Z" fill="url(#aboutGrad2)"/>
    <path d="M0 50 L14 8 L0 -8 L-14 8 Z" fill="url(#aboutGrad1)" opacity="0.7"/>
    <circle r="8" fill="#F8FAFC"/>
  </g>

  <!-- Orbiting nodes -->
  <g>
    <circle cx="280" cy="100" r="10" fill="#06B6D4"/>
    <circle cx="460" cy="260" r="10" fill="#7C3AED"/>
    <circle cx="280" cy="420" r="10" fill="#2563EB"/>
    <circle cx="100" cy="260" r="10" fill="#06B6D4"/>
  </g>

  <!-- Connecting dashed orbit lines -->
  <circle cx="280" cy="260" r="180" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 8" opacity="0.35"/>

  <!-- Small floating cards representing pillars -->
  <g transform="translate(60,80)">
    <rect width="120" height="70" rx="14" fill="#101827" stroke="url(#aboutGrad1)" stroke-width="1.5"/>
    <circle cx="24" cy="24" r="10" fill="url(#aboutGrad2)"/>
    <rect x="14" y="44" width="90" height="6" rx="3" fill="#94A3B8" opacity="0.6"/>
    <rect x="14" y="56" width="60" height="6" rx="3" fill="#94A3B8" opacity="0.4"/>
  </g>

  <g transform="translate(380,370)">
    <rect width="120" height="70" rx="14" fill="#101827" stroke="url(#aboutGrad2)" stroke-width="1.5"/>
    <circle cx="24" cy="24" r="10" fill="url(#aboutGrad1)"/>
    <rect x="14" y="44" width="90" height="6" rx="3" fill="#94A3B8" opacity="0.6"/>
    <rect x="14" y="56" width="60" height="6" rx="3" fill="#94A3B8" opacity="0.4"/>
  </g>
</svg>
