<svg viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
  <defs>
    <linearGradient id="servGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <rect x="40" y="60" width="230" height="150" rx="20" fill="#101827" stroke="url(#servGrad)" stroke-width="1.5" opacity="0.9"/>
  <rect x="330" y="40" width="230" height="150" rx="20" fill="#101827" stroke="url(#servGrad)" stroke-width="1.5" opacity="0.95"/>
  <rect x="180" y="260" width="230" height="150" rx="20" fill="#101827" stroke="url(#servGrad)" stroke-width="1.5"/>

  <!-- icon 1: megaphone -->
  <g transform="translate(80,100)">
    <path d="M0 10 L28 0 L28 40 L0 30 Z" fill="#06B6D4"/>
    <rect x="28" y="8" width="14" height="24" rx="4" fill="#7C3AED"/>
  </g>
  <rect x="80" y="160" width="140" height="8" rx="4" fill="#94A3B8" opacity="0.5"/>
  <rect x="80" y="178" width="90" height="8" rx="4" fill="#94A3B8" opacity="0.3"/>

  <!-- icon 2: bar chart -->
  <g transform="translate(370,80)">
    <rect x="0" y="30" width="12" height="40" rx="3" fill="#2563EB"/>
    <rect x="18" y="16" width="12" height="54" rx="3" fill="#7C3AED"/>
    <rect x="36" y="0" width="12" height="70" rx="3" fill="#06B6D4"/>
  </g>
  <rect x="370" y="140" width="140" height="8" rx="4" fill="#94A3B8" opacity="0.5"/>
  <rect x="370" y="158" width="100" height="8" rx="4" fill="#94A3B8" opacity="0.3"/>

  <!-- icon 3: search magnifier -->
  <g transform="translate(220,300)">
    <circle cx="16" cy="16" r="16" fill="none" stroke="#06B6D4" stroke-width="5"/>
    <line x1="28" y1="28" x2="42" y2="42" stroke="#7C3AED" stroke-width="6" stroke-linecap="round"/>
  </g>
  <rect x="220" y="360" width="140" height="8" rx="4" fill="#94A3B8" opacity="0.5"/>
  <rect x="220" y="378" width="90" height="8" rx="4" fill="#94A3B8" opacity="0.3"/>

  <!-- connecting dots -->
  <circle cx="300" cy="230" r="5" fill="#06B6D4"/>
  <circle cx="260" cy="245" r="4" fill="#7C3AED"/>
  <circle cx="340" cy="245" r="4" fill="#2563EB"/>
</svg>
