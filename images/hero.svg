<svg viewBox="0 0 640 560" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
  <defs>
    <linearGradient id="heroGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="heroGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="heroGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Floating platform / dashboard card -->
  <g filter="url(#heroGlow)">
    <rect x="70" y="120" width="500" height="330" rx="28" fill="#101827" stroke="url(#heroGrad1)" stroke-width="2" opacity="0.95"/>
  </g>

  <!-- Dashboard header dots -->
  <circle cx="110" cy="160" r="6" fill="#7C3AED"/>
  <circle cx="132" cy="160" r="6" fill="#06B6D4"/>
  <circle cx="154" cy="160" r="6" fill="#2563EB"/>

  <!-- Growth chart bars -->
  <g>
    <rect x="120" y="330" width="34" height="90" rx="8" fill="url(#heroGrad1)" opacity="0.9"/>
    <rect x="170" y="300" width="34" height="120" rx="8" fill="url(#heroGrad2)" opacity="0.9"/>
    <rect x="220" y="260" width="34" height="160" rx="8" fill="url(#heroGrad1)" opacity="0.9"/>
    <rect x="270" y="220" width="34" height="200" rx="8" fill="url(#heroGrad2)" opacity="0.9"/>
    <rect x="320" y="180" width="34" height="240" rx="8" fill="url(#heroGrad1)" opacity="0.95"/>
  </g>

  <!-- Ascending trend line -->
  <polyline points="130,300 190,270 240,230 290,190 350,150 400,120"
    fill="none" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <circle cx="400" cy="120" r="9" fill="#06B6D4"/>
  <circle cx="400" cy="120" r="16" fill="none" stroke="#06B6D4" stroke-width="2" opacity="0.5"/>

  <!-- Floating stat pill -->
  <g transform="translate(420,150)">
    <rect x="0" y="0" width="150" height="56" rx="18" fill="#0B1424" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="75" y="24" text-anchor="middle" font-family="Poppins, sans-serif" font-size="14" fill="#F8FAFC" font-weight="600">+128%</text>
    <text x="75" y="42" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94A3B8">Lead Growth</text>
  </g>

  <!-- Megaphone icon -->
  <g transform="translate(130,190)">
    <path d="M0 20 L34 4 L34 46 L0 30 Z" fill="url(#heroGrad2)"/>
    <rect x="34" y="14" width="16" height="22" rx="4" fill="url(#heroGrad1)"/>
    <path d="M8 30 L8 46 Q8 54 16 54 L18 54 L14 30 Z" fill="#2563EB"/>
    <circle cx="55" cy="10" r="3" fill="#06B6D4"/>
    <circle cx="62" cy="20" r="2.4" fill="#7C3AED"/>
    <circle cx="55" cy="30" r="2" fill="#2563EB"/>
  </g>

  <!-- Floating audience icons -->
  <g transform="translate(440,280)" opacity="0.95">
    <circle cx="0" cy="0" r="18" fill="#08101F" stroke="url(#heroGrad1)" stroke-width="2"/>
    <circle cx="0" cy="-5" r="6" fill="#F8FAFC"/>
    <path d="M-10 12 Q0 -2 10 12" fill="#F8FAFC"/>
  </g>
  <g transform="translate(480,320)" opacity="0.85">
    <circle cx="0" cy="0" r="14" fill="#08101F" stroke="url(#heroGrad2)" stroke-width="2"/>
    <circle cx="0" cy="-4" r="5" fill="#F8FAFC"/>
    <path d="M-8 10 Q0 -1 8 10" fill="#F8FAFC"/>
  </g>

  <!-- Orbiting target/ad icon -->
  <g transform="translate(500,370)">
    <circle cx="0" cy="0" r="26" fill="none" stroke="#06B6D4" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="6" fill="#06B6D4"/>
  </g>

  <!-- Base shadow ellipse -->
  <ellipse cx="320" cy="480" rx="220" ry="18" fill="#7C3AED" opacity="0.08"/>
</svg>
